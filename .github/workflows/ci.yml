name: CI

on:
  # Validate every PR (GitHub builds the merge result). This is the run that
  # gates merging, and it covers all feature-branch work.
  pull_request:
  # Only build direct pushes to main (merges + the occasional direct commit).
  # Scoping push to main means a branch with an open PR is no longer built
  # twice (once for the push, once for the PR) — only the PR run fires.
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (GCC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: macos-latest
            name: macOS (Clang)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: windows-latest
            name: Windows (MSVC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev

      - name: Configure
        run: cmake -B build -DFETCHCONTENT_UPDATES_DISCONNECTED=ON ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
