name: CI

on:
  # Validate every PR (GitHub builds the merge result). This is the run that
  # gates merging, and it covers all feature-branch work.
  pull_request:
  # Only build direct pushes to main (merges + the occasional direct commit).
  # Scoping push to main means a branch with an open PR is no longer built
  # twice (once for the push, once for the PR) — only the PR run fires.
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (GCC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: macos-latest
            name: macOS (Clang)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: windows-latest
            name: Windows (MSVC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # NOTE: we deliberately do NOT cache the configured `build/` tree. The MSVC
      # multi-config generator bakes an absolute VS instance path
      # (CMAKE_GENERATOR_INSTANCE) into build/CMakeCache.txt; when GitHub rolls the
      # windows-latest image and the VS edition/path changes, a restored cache makes
      # `project()` fail with "could not find specified instance of Visual Studio".
      # Configuring fresh each run is a little slower but immune to that drift.

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev

      # Cap build parallelism to the runner's logical CPU count. A bare
      # `cmake --build --parallel` (no number) hands `make -j` UNLIMITED jobs: the
      # moment libvoxel-engine.a is ready, ~50 object files (the test executable's
      # TUs + every demo's main.cpp) launch at once. On the ~3-4 core macOS runner
      # that oversubscribes CPU and RAM (compiles thrash/swap), which is why its
      # build took ~9 min vs ~2.5 min on Linux. CMake only honors
      # CMAKE_BUILD_PARALLEL_LEVEL when --parallel is NOT passed, so the Build step
      # below omits the flag and lets this env var drive the job count instead.
      # getconf is portable across Linux, macOS, and Git Bash on Windows.
      - name: Set build parallelism
        shell: bash
        run: echo "CMAKE_BUILD_PARALLEL_LEVEL=$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -DFETCHCONTENT_UPDATES_DISCONNECTED=ON ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
